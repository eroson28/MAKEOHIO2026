<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Camera Site</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <main>
            <div class="titlebar">
                <h1>LCD Doorbell Manager</h1>
                <h2>By Nate Levison, Anthony Cohen, Erol Sonmez</h2>
            </div>
            <hr>
            <legend>Status Setter</legend>
            <fieldset class="row">
                <div class="col" style="flex: 1">
                    <label for="color">LED Color</label>
                    <label for="title">Status Title</label>
                    <label for="caption">Status Subtitle</label>
                </div>
                <div class="col" style="flex: 2">
                    <input id="color" type="color">
                    <input id="title" type="text" placeholder="Office Hours">
                    <input id="caption" type="text" placeholder="Please knock before entering">
                </div>
                <div class="col" style="flex: 3;">
                    <button id="update-status" class="btn-main">Update Status</button>
                </div>
            </fieldset>
        </main>
    </body>
    <script>
        const updateStatusBtn = document.getElementById("update-status");
        updateStatusBtn.addEventListener("click", e => {
            const colorE = document.getElementById("color");
            const titleE = document.getElementById("title");
            const captionE = document.getElementById("caption");
            const color = colorE.value;
            const title = titleE.value;
            const caption = captionE.value;
            fetch("/set-status", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    color,
                    title,
                    caption
                })
            });
        });
    </script>
    <style>
        :root {
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        }

        main {
            margin: 20px;
            background: #ddd;
            padding: 20px;
            border-radius: 5px;
            border: 0.5px solid black;
        }

        fieldset {
            padding: 20px;
        }

        .btn-main {
            height: 100%;
            font-size: 2em;
        }

        .titlebar {
            text-align: center;
        }

        .row {
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }

        .col {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 3px;
        }
    </style>
</html>
